name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python data/seed.py
      - run: ruff check .
      - run: pytest -q                        # unit tests (guardrails, memory, sandbox, agent)
      - run: ATLAS_PERSIST_MEMORY=0 python -m eval.run --offline  # regression suite, no API keys
